{% extends 'base.html' %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <img src="{{ product.image }}" class="img-fluid rounded" alt="{{ product.name }}">
    </div>
    <div class="col-md-8">
        <h1>{{ product.name }}</h1>
        <p class="text-muted">{{ product.category }}</p>
        <p><strong>Price: ${{ product.price }}</strong></p>
        <p style="white-space: pre-wrap;">{{ product.description|default:"—" }}</p>
        <p class="text-muted">Added: {{ product.created_at }}</p>
    </div>
</div>
{% endblock %}
